name: DevLens AI — CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  backend-lint-test:
    name: Backend — Lint & Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: devlens
          POSTGRES_PASSWORD: devlens_password
          POSTGRES_DB: devlens_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://devlens:devlens_password@localhost:5432/devlens_test
      REDIS_URL: redis://localhost:6379/0
      OPENAI_API_KEY: sk-test-placeholder
      OPENAI_CHAT_MODEL: gpt-4o
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
      OPENAI_EMBEDDING_DIMENSIONS: "1536"
      GITHUB_CLIENT_ID: test-client-id
      GITHUB_CLIENT_SECRET: test-client-secret
      GITHUB_REDIRECT_URI: http://localhost:8000/api/v1/auth/github/callback
      API_KEY: ci-test-api-key
      SECRET_KEY: ci-test-secret-key-32-chars-long!!

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install ruff aiosqlite

      - name: Lint with ruff
        run: |
          cd backend
          ruff check app/ --select E,W,F,I --ignore E501

      - name: Run migrations
        run: |
          cd backend
          alembic upgrade head

      - name: Run tests
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=40

  frontend-typecheck:
    name: Frontend — Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run tsc --noEmit

      - name: Build (smoke test)
        run: bun run build
        env:
          VITE_API_URL: http://localhost:8000
          VITE_API_KEY: ci-test-key

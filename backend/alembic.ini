# Alembic Configuration File
# Used by `alembic upgrade head`, `alembic revision --autogenerate`, etc.

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for generated migration timestamps
timezone = UTC

# Max length of slug in generated migration filenames
truncate_slug_length = 40

# sys.path modification (leave empty — we use PYTHONPATH)
prepend_sys_path = .

# SQLAlchemy connection URL — overridden at runtime by alembic/env.py
# which reads from the DATABASE_URL environment variable
sqlalchemy.url = postgresql+asyncpg://devlens:devlens_password@localhost:5432/devlens

[post_write_hooks]
# Optional: auto-format generated migration files
# hooks = black
# black.type = console_scripts
# black.entrypoint = black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
